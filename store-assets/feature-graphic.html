<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; }
    body { width: 1024px; height: 500px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #FFF0F3 0%, #FFE0E8 50%, #FFD1DC 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
    .container { text-align: center; }
    .emoji { font-size: 80px; margin-bottom: 16px; }
    h1 { font-size: 64px; font-weight: 900; color: #FF6B8A; margin-bottom: 8px; letter-spacing: -1px; }
    .tagline { font-size: 24px; color: #CC5577; font-weight: 500; }
    .pills { position: absolute; font-size: 40px; opacity: 0.3; }
    .p1 { top: 30px; left: 60px; transform: rotate(-15deg); }
    .p2 { top: 80px; right: 80px; transform: rotate(20deg); }
    .p3 { bottom: 40px; left: 120px; transform: rotate(10deg); }
    .p4 { bottom: 60px; right: 140px; transform: rotate(-25deg); }
    .p5 { top: 200px; left: 40px; transform: rotate(30deg); }
    .p6 { top: 150px; right: 50px; transform: rotate(-10deg); }
  </style>
</head>
<body>
  <span class="pills p1">💊</span>
  <span class="pills p2">🐾</span>
  <span class="pills p3">🐱</span>
  <span class="pills p4">🐶</span>
  <span class="pills p5">💕</span>
  <span class="pills p6">💊</span>
  <div class="container">
    <div class="emoji">💊🐾</div>
    <h1>PetPill</h1>
    <p class="tagline">Track your pet's medications with love</p>
  </div>
</body>
</html>
